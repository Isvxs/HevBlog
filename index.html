<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <title>DevLog | 你的開發部落格</title>
    <style>
        /* ... 延續上一版的 CSS ... */
        .post-card { background: white; padding: 25px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .loading { text-align: center; padding: 20px; color: #888; }
    </style>
</head>
<body>

    <header><h1>DevLog</h1></header>

    <div id="posts-container"></div>
    <div id="loading" class="loading">載入中...</div>

    <script>
        const GITHUB_USER = 'Isvxs';
        const GITHUB_REPO = 'HevBlog';
        let allPosts = []; // 存儲所有文章清單 (為了搜尋)
        let displayedCount = 0;
        const PAGE_SIZE = 15;

        // 初始化
        async function init() {
            const cached = sessionStorage.getItem('blog_posts');
            if (cached) {
                allPosts = JSON.parse(cached);
            } else {
                await fetchPostList();
            }
            renderPosts();
            window.addEventListener('scroll', handleScroll);
        }

        async function fetchPostList() {
            const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/posts`);
            const files = (await res.json()).filter(f => f.name.endsWith('.json')).reverse();
            
            // 為了效能，只抓檔案資訊。點進去時再抓內容太慢，所以這邊一次抓好
            const posts = await Promise.all(files.map(f => fetch(f.download_url).then(r => r.json())));
            allPosts = posts;
            sessionStorage.setItem('blog_posts', JSON.stringify(allPosts));
        }

        function renderPosts() {
            const container = document.getElementById('posts-container');
            const end = Math.min(displayedCount + PAGE_SIZE, allPosts.length);
            
            for (let i = displayedCount; i < end; i++) {
                const post = allPosts[i];
                const div = document.createElement('article');
                div.className = 'post-card';
                div.innerHTML = `
                    <span class="category-tag">${post.category}</span>
                    <h2>${post.title}</h2>
                    <div>${post.content}</div>
                `;
                container.appendChild(div);
            }
            
            displayedCount = end;
            if (displayedCount >= allPosts.length) {
                document.getElementById('loading').innerText = "沒有更多文章了";
                window.removeEventListener('scroll', handleScroll);
            }
        }

        function handleScroll() {
            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 500) {
                renderPosts();
            }
        }

        init();
    </script>
</body>
</html>
