<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HevLog | 開發者日誌</title>
    <style>
        :root { --accent: #63adf7; --bg: #f6f8fa; }
        body { font-family: sans-serif; background: var(--bg); max-width: 800px; margin: 0 auto; padding: 20px; }
        .post-card { background: white; padding: 20px; margin-bottom: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-top: 4px solid var(--accent); }
        .loading-sentinel { text-align: center; padding: 20px; color: #888; font-size: 0.9em; }
        .search-bar { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
    </style>
</head>
<body>

    <h1>HevLog</h1>
    <input type="text" id="search" class="search-bar" placeholder="搜尋標題或內容...">
    
    <div id="posts-container"></div>
    <div id="loading-node" class="loading-sentinel">正在準備文章清單...</div>

    <script>
        const GITHUB_USER = 'Isvxs';
        const GITHUB_REPO = 'HevBlog';
        
        let fileList = [];      
        let loadedPosts = [];   
        let currentIndex = 0;   
        
        // 1. 修改為每次載入 9 篇
        const PAGE_SIZE = 9;   
        let isFetching = false;

        // 2. 新增一個 Set 來追蹤已經出現過的「文章內容」，用來過濾重複
        const seenContents = new Set();

        async function init() {
            const cachedPosts = sessionStorage.getItem('loaded_content');
            if (cachedPosts) {
                loadedPosts = JSON.parse(cachedPosts);
                // 從快取還原時，也要把內容加入 seenContents，避免後續載入時重複
                loadedPosts.forEach(post => {
                    const cleanContent = post.content ? post.content.trim() : "";
                    seenContents.add(cleanContent);
                });
                renderInitial(loadedPosts);
            }

            try {
                const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/posts`);
                const data = await res.json();
                fileList = data.filter(f => f.name.endsWith('.json')).reverse();
                
                if (loadedPosts.length === 0) {
                    loadNextBatch();
                } else {
                    // 如果有快取，我們需要推算 currentIndex 應該在哪裡
                    // 因為有過濾重複機制，實際渲染的文章數 (loadedPosts.length) 會小於或等於已讀取的檔案數
                    // 為了簡單且避免重複讀取，我們直接從頭比對哪些檔案還沒被讀過，或者直接讓 currentIndex 加上對應的數量
                    // 但最穩妥的方式是每次滑動都重新檢查剩餘檔案
                    currentIndex = parseInt(sessionStorage.getItem('current_file_index')) || loadedPosts.length;
                    updateLoadingText();
                }
            } catch (e) {
                document.getElementById('loading-node').innerText = "無法讀取清單。";
            }

            const observer = new IntersectionObserver((entries) => {
                if (entries[0].isIntersecting && !isFetching) {
                    loadNextBatch();
                }
            }, { threshold: 0.1 });
            observer.observe(document.getElementById('loading-node'));
        }

        async function loadNextBatch() {
            if (currentIndex >= fileList.length || isFetching) return;
            isFetching = true;
            document.getElementById('loading-node').innerText = "載入中...";

            const nextBatchFiles = fileList.slice(currentIndex, currentIndex + PAGE_SIZE);
            
            try {
                const batchContent = await Promise.all(
                    nextBatchFiles.map(file => fetch(file.download_url).then(r => r.json()))
                );

                // 3. 過濾掉內容重複的文章
                const uniqueBatch = [];
                batchContent.forEach(post => {
                    const cleanContent = post.content ? post.content.trim() : "";
                    // 如果這個內容還沒出現過，才把它加進畫面
                    if (!seenContents.has(cleanContent)) {
                        seenContents.add(cleanContent);
                        uniqueBatch.push(post);
                    } else {
                        console.log("已自動過濾重複內容的貼文:", post.title);
                    }
                });

                loadedPosts = [...loadedPosts, ...uniqueBatch];
                
                // 更新快取，並記錄目前讀取到第幾個檔案，確保重新整理後不會重複讀取
                sessionStorage.setItem('loaded_content', JSON.stringify(loadedPosts));
                currentIndex += nextBatchFiles.length;
                sessionStorage.setItem('current_file_index', currentIndex);
                
                renderBatch(uniqueBatch);
            } catch (e) {
                console.error("Batch fetch error", e);
            } finally {
                isFetching = false;
                updateLoadingText();
            }
        }

        function renderBatch(posts) {
            const container = document.getElementById('posts-container');
            posts.forEach(post => {
                const div = document.createElement('div');
                div.className = 'post-card';
                div.innerHTML = `
                    <small style="color:var(--accent); font-weight:bold;">${post.category || '一般'}</small>
                    <h2 style="margin:5px 0;">${post.title}</h2>
                    <div style="font-size:0.9em; color:#666; margin-bottom:15px;">📅 ${new Date(post.date).toLocaleDateString()}</div>
                    <div class="content">${post.content}</div>
                `;
                container.appendChild(div);
            });
        }

        function renderInitial(posts) {
            document.getElementById('posts-container').innerHTML = '';
            renderBatch(posts);
        }

        function updateLoadingText() {
            const node = document.getElementById('loading-node');
            if (currentIndex >= fileList.length) {
                node.innerText = "已讀完所有文章";
            } else {
                node.innerText = "向下滾動載入更多...";
            }
        }

        document.getElementById('search').addEventListener('input', (e) => {
            const term = e.target.value.toLowerCase();
            const cards = document.querySelectorAll('.post-card');
            cards.forEach(card => {
                const text = card.innerText.toLowerCase();
                card.style.display = text.includes(term) ? 'block' : 'none';
            });
        });

        init();
    </script>
</body>
</html>
