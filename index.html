<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/jpeg" href="Lua.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>H̶e̶v̶L̶o̶g̶ | SYSTΞM_FAILURΞ</title>
    <style>
        :root {
            /* 鬼畜配色：極高對比、閃爍 */
            --bg: #000; --text: #0f0; --border: #f0f;
            --font-prank: "Wingdings", "Comic Sans MS", cursive;
        }

        [data-theme="dark"] { --bg: #f0f; --text: #000; --border: #000; }

        * { box-sizing: border-box; cursor: crosshair !important; }

        body { 
            margin: 0; background: var(--bg); color: var(--text); 
            font-family: var(--font-prank);
            overflow-x: hidden;
            /* 效果 1: 全螢幕濾鏡旋轉，讓人頭暈 */
            animation: hueRotate 5s infinite linear;
        }
        @keyframes hueRotate { from { filter: hue-rotate(0deg); } to { filter: hue-rotate(360deg); } }

        /* 效果 2: 標題是隨機代碼 */
        header {
            position: fixed; top: 0; width: 100%; height: 60px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 30px; border-bottom: 2px solid var(--border);
            background: var(--bg); z-index: 1000;
        }
        header h1 { font-size: 1rem; text-transform: uppercase; animation: glitch 0.2s infinite; }
        @keyframes glitch { 
            0% { transform: translate(1px, 1px); } 
            50% { transform: translate(-2px, -2px) skew(10deg); color: #f00; }
            100% { transform: translate(1px, 1px); } 
        }

        /* 效果 3: 搜尋框按下去會放大 10 倍 */
        .search-wrapper { position: relative; }
        .search-bar {
            background: #fff; color: #000; font-family: sans-serif;
            transition: 0.2s;
        }
        .search-bar:focus { 
            transform: scale(10) translate(-50px, 100px); 
            position: absolute; z-index: 9999; 
        }

        /* 效果 4: 按鈕點擊後會「爆炸」並克隆自己 */
        #theme-btn { animation: pulsate 0.5s infinite; }
        @keyframes pulsate { 0% { opacity: 1; } 50% { opacity: 0.1; transform: scale(1.1); } }

        .layout { display: flex; max-width: 1200px; margin: 80px auto 0; padding: 0 20px; gap: 40px; }

        /* 效果 5: 目錄會隨機漂浮 */
        aside { width: 220px; position: relative; }
        .toc-item { 
            display: block; font-size: 0.8rem; color: #00f; 
            text-decoration: underline; margin-bottom: 10px;
            animation: float 3s infinite ease-in-out;
        }
        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(10px, -20px) rotate(5deg); }
        }

        main { flex: 1; max-width: 700px; position: relative; }

        /* 效果 6: 文章內容垂直倒立，滑鼠移上去才正過來 */
        .post-card {
            margin-bottom: 50px; border: 3px solid var(--border); padding: 20px;
            background: var(--card);
            transform: rotateX(180deg);
            transition: transform 0.3s;
        }
        .post-card:hover { transform: rotateX(0deg) scale(1.1); z-index: 999; }
        .post-card h2 { font-family: "Fira Code", monospace; font-size: 1rem; color: #f00; }
        .content { font-family: sans-serif; font-size: 0.9rem; color: #fff; }

        /* 效果 7: 假死機藍屏 */
        #bsod {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #0000aa; color: #fff; font-family: sans-serif;
            display: none; z-index: 99999; padding: 50px;
            font-size: 1.5rem;
        }

        .system-status { font-size: 8rem; color: #ff0; animation: blink 0.1s infinite; text-align: center; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0; } }
    </style>
</head>
<body data-theme="dark">

    <div id="bsod">
        <h1>:(</h1>
        <p>A problem has been detected and HevLog has been shut down to prevent damage to your brain.</p>
        <p>REASON: USER_INTELLIGENCE_NOT_FOUND</p>
        <p>Please restart your computer and think about what you've done.</p>
        <p>Progress: <span id="bsod-pc">0</span>%</p>
    </div>

    <header>
        <h1 id="logo">T̸H̸E̸_L̸O̸G̸</h1>
        <div class="nav-right">
            <div class="search-wrapper">
                <input type="text" class="search-bar" placeholder="快打字，我要爆炸了...">
            </div>
            <button id="theme-btn">不要點我</button>
        </div>
    </header>

    <div class="layout">
        <aside>
            <h4>目錄 (已經瘋了)</h4>
            <div id="toc-list">
                <a href="#" class="toc-item">NULL_POINTER</a>
                <a href="#" class="toc-item">SEG_FAULT</a>
            </div>
        </aside>

        <main id="main-content">
            <div id="posts-container"></div>
            <div id="loading-node" class="system-status">死機中...</div>
        </main>
    </div>

    <script>
        const CONFIG = { USER: 'Isvxs', REPO: 'HevBlog', BRANCH: 'main' };
        
        // 效果 8: 滑鼠跟隨矩陣代碼
        document.addEventListener('mousemove', (e) => {
            const code = document.createElement('div');
            code.innerText = Math.random() > 0.5 ? '1' : '0';
            code.style.position = 'absolute';
            code.style.left = e.pageX + 'px';
            code.style.top = e.pageY + 'px';
            code.style.color = '#0f0';
            code.style.fontSize = '10px';
            code.style.zIndex = '9999';
            code.style.pointerEvents = 'none';
            document.body.appendChild(code);
            setTimeout(() => code.remove(), 500);
        });

        // 效果 9: 隨機播放尖叫聲 (預設靜音，點擊後觸發)
        document.body.onclick = () => {
            if(!window.audioTrig) {
                const audio = new Audio('https://www.soundjay.com/human/screams/scream-01.mp3');
                audio.volume = 0.1;
                audio.play();
                window.audioTrig = true;
            }
        };

        async function init() {
            setTimeout(loadPosts, 2000); // 故意延遲
        }

        async function loadPosts() {
            try {
                const treeUrl = `https://api.github.com/repos/${CONFIG.USER}/${CONFIG.REPO}/git/trees/${CONFIG.BRANCH}?recursive=1`;
                const res = await fetch(treeUrl).then(r => r.json());
                const files = res.tree.filter(f => f.path.startsWith('posts/')).reverse();

                for (let file of files.slice(0, 3)) { // 只載入三篇，因為畫面太亂了
                    const data = await fetch(`https://cdn.jsdelivr.net/gh/${CONFIG.USER}/${CONFIG.REPO}@${CONFIG.BRANCH}/${file.path}`).then(r => r.json());
                    const art = document.createElement('article');
                    art.className = 'post-card';
                    // 效果 10: 內容加密 (滑鼠移上去解密)
                    const originalContent = data.content;
                    const encryptedContent = originalContent.replace(/./g, () => String.fromCharCode(Math.random() * 100 + 1000));
                    
                    art.innerHTML = `<h2>${data.title}</h2><div class="content" id="c-${file.sha}">${encryptedContent}</div>`;
                    
                    art.onmouseover = () => document.getElementById(`c-${file.sha}`).innerText = originalContent;
                    art.onmouseout = () => document.getElementById(`c-${file.sha}`).innerText = encryptedContent;
                    
                    document.getElementById('posts-container').appendChild(art);
                }
                document.getElementById('loading-node').style.display = 'none';
            } catch(e) {
                triggerBSOD();
            }
        }

        // 效果 11: 點擊按鈕觸發藍屏
        document.getElementById('theme-btn').onclick = () => {
            const btn = document.getElementById('theme-btn');
            for(let i=0; i<10; i++) {
                const clone = btn.cloneNode(true);
                clone.style.position = 'absolute';
                clone.style.left = Math.random() * window.innerWidth + 'px';
                clone.style.top = Math.random() * window.innerHeight + 'px';
                document.body.appendChild(clone);
            }
            setTimeout(triggerBSOD, 1000);
        };

        function triggerBSOD() {
            const bsod = document.getElementById('bsod');
            const pc = document.getElementById('bsod-pc');
            bsod.style.display = 'block';
            let count = 0;
            const timer = setInterval(() => {
                count++;
                pc.innerText = count;
                if(count >= 100) {
                    clearInterval(timer);
                    location.reload(); // 100% 後自動重新整理
                }
            }, 50);
        }

        init();
    </script>
</body>
</html>
