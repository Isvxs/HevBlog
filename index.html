<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DevLog | 開發者日誌</title>
    <style>
        :root { --primary: #24292e; --accent: #2ea44f; --bg: #f6f8fa; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); max-width: 900px; margin: 0 auto; padding: 20px; line-height: 1.6; }
        .search-card { background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .post-card { background: white; padding: 30px; margin-bottom: 20px; border-radius: 8px; border-top: 5px solid var(--accent); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .tag { display: inline-block; background: #eefcf1; color: var(--accent); padding: 2px 10px; border-radius: 4px; font-size: 0.8em; font-weight: bold; }
        #loading { text-align: center; padding: 20px; color: #666; }
    </style>
</head>
<body>

    <header><h1>DevLog</h1></header>

    <div class="search-card">
        <input type="text" id="search-box" placeholder="🔍 搜尋標題、內容或分類..." style="width:100%; padding:10px; border:1px solid #ddd; border-radius:4px;">
    </div>

    <div id="posts-container"></div>
    <div id="loading">載入中...</div>

    <script>
        const GITHUB_USER = 'Isvxs';
        const GITHUB_REPO = 'HevBlog';
        
        let allPosts = [];      // 原始所有資料
        let filteredPosts = []; // 搜尋後資料
        let displayedCount = 0;
        const PAGE_SIZE = 8;

        // 初始化
        async function init() {
            const cached = sessionStorage.getItem('blog_posts');
            if (cached) {
                allPosts = JSON.parse(cached);
                filteredPosts = [...allPosts];
            } else {
                await fetchPosts();
            }
            renderPosts();
            
            // 搜尋監聽
            document.getElementById('search-box').addEventListener('input', (e) => {
                const term = e.target.value.toLowerCase();
                filteredPosts = allPosts.filter(p => 
                    p.title.toLowerCase().includes(term) || 
                    p.content.toLowerCase().includes(term) || 
                    p.category.toLowerCase().includes(term)
                );
                displayedCount = 0;
                document.getElementById('posts-container').innerHTML = '';
                renderPosts();
            });

            // 滾動監聽
            window.addEventListener('scroll', () => {
                if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 200) {
                    renderPosts();
                }
            });
        }

        async function fetchPosts() {
            try {
                const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/posts`);
                const files = (await res.json()).filter(f => f.name.endsWith('.json')).reverse();
                allPosts = await Promise.all(files.map(f => fetch(f.download_url).then(r => r.json())));
                filteredPosts = [...allPosts];
                sessionStorage.setItem('blog_posts', JSON.stringify(allPosts));
            } catch (e) {
                document.getElementById('loading').innerText = "載入失敗，請檢查網路。";
            }
        }

        function renderPosts() {
            const container = document.getElementById('posts-container');
            const end = Math.min(displayedCount + PAGE_SIZE, filteredPosts.length);
            
            for (let i = displayedCount; i < end; i++) {
                const p = filteredPosts[i];
                const div = document.createElement('article');
                div.className = 'post-card';
                div.innerHTML = `
                    <span class="tag">${p.category}</span>
                    <h2>${p.title}</h2>
                    <small>${new Date(p.date).toLocaleDateString()}</small>
                    <div>${p.content}</div>
                `;
                container.appendChild(div);
            }
            
            displayedCount = end;
            const loading = document.getElementById('loading');
            loading.innerText = displayedCount >= filteredPosts.length ? "沒有更多文章了" : "向下滑動載入更多...";
        }

        init();
    </script>
</body>
</html>
