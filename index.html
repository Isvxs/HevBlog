<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/jpeg" href="Lua.png">
    <link rel="apple-touch-icon" href="Lua.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HevLog | Dev Log</title>
    <style>
        :root {
            --bg: #ffffff; --card: #ffffff; --text: #1a1a1a; --muted: #666666;
            --accent: #000000; --border: #e1e1e1; --header-bg: rgba(255,255,255,0.8);
            --font-main: "SF Mono", "Cascadia Code", "Fira Code", "Courier New", monospace;
        }
        [data-theme="dark"] {
            --bg: #0a0a0a; --card: #141414; --text: #e0e0e0; --muted: #888888;
            --accent: #ffffff; --border: #262626; --header-bg: rgba(10,10,10,0.8);
        }
        * { box-sizing: border-box; scroll-behavior: smooth; }
        body {
            margin: 0; background-color: var(--bg); color: var(--text);
            font-family: var(--font-main); line-height: 1.5;
            transition: background 0.2s ease;
        }
        header {
            position: fixed; top: 0; width: 100%; height: 60px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 30px; border-bottom: 1px solid var(--border);
            background: var(--header-bg); backdrop-filter: blur(10px); z-index: 1000;
        }
        header h1 { font-size: 1.2rem; font-weight: 800; letter-spacing: -1px; margin: 0; cursor: pointer; }
        .nav-right { display: flex; align-items: center; gap: 15px; }
        .search-bar {
            background: var(--bg); border: 1px solid var(--border);
            color: var(--text); padding: 6px 12px; font-family: var(--font-main);
            font-size: 0.85rem; width: 220px; outline: none; transition: width 0.3s;
        }
        .search-bar:focus { border-color: var(--accent); width: 280px; }
        #theme-toggle {
            background: none; border: 1px solid var(--border); color: var(--text);
            padding: 4px 10px; cursor: pointer; font-family: var(--font-main); font-size: 0.75rem;
        }
        .layout { display: flex; max-width: 1200px; margin: 80px auto 0; padding: 0 20px; gap: 40px; }
        aside { width: 220px; position: sticky; top: 80px; height: calc(100vh - 100px); overflow-y: auto; }
        aside h4 { font-size: 0.75rem; text-transform: uppercase; color: var(--muted); margin-bottom: 15px; }
        .toc-item { 
            display: block; font-size: 0.8rem; color: var(--muted); text-decoration: none;
            padding: 6px 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
            transition: color 0.2s; border-left: 2px solid transparent; padding-left: 10px;
        }
        .toc-item:hover { color: var(--accent); border-left-color: var(--accent); }
        main { flex: 1; max-width: 700px; }
        .post-card { padding-bottom: 50px; margin-bottom: 50px; border-bottom: 1px solid var(--border); animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .meta { font-size: 0.75rem; color: var(--muted); margin-bottom: 8px; display: flex; gap: 15px; }
        .category { color: var(--accent); font-weight: bold; }
        .post-card h2 { font-size: 1.5rem; margin: 0 0 15px 0; letter-spacing: -0.5px; scroll-margin-top: 80px; }
        .content { font-size: 0.95rem; color: var(--text); }
        .content img { max-width: 100%; border-radius: 2px; filter: grayscale(0.2); transition: 0.3s; }
        .content img:hover { filter: grayscale(0); }
        .status-msg { text-align: center; padding: 40px; font-size: 0.8rem; color: var(--muted); }
        @media (max-width: 900px) { aside { display: none; } .layout { justify-content: center; } }

        /* --- 新增：反應按鈕區塊樣式 --- */
        .reactions {
            display: flex; gap: 10px; margin-top: 25px;
        }
        .reaction-btn {
            background: transparent; border: 1px solid var(--border); color: var(--muted);
            padding: 4px 12px; border-radius: 20px; cursor: pointer; font-family: var(--font-main);
            font-size: 0.85rem; display: flex; align-items: center; gap: 6px; transition: all 0.2s;
        }
        .reaction-btn:hover { border-color: var(--muted); color: var(--text); }
        .reaction-btn.active { border-color: var(--accent); color: var(--text); font-weight: bold; }
        
        /* 核心：將 Emoji 轉為純黑或純白 */
        .emoji-icon { filter: brightness(0); }
        [data-theme="dark"] .emoji-icon { filter: brightness(0) invert(1); }
    </style>
</head>
<body data-theme="light">

    <header>
        <h1 onclick="location.reload()">HevLog</h1>
        <div class="nav-right">
            <input type="search" id="search" class="search-bar" placeholder="搜尋標題、內容、日期...">
            <button id="theme-toggle">MODE</button>
        </div>
    </header>

    <div class="layout">
        <aside>
            <h4>Index / 目錄導覽</h4>
            <div id="toc-list"></div>
        </aside>
        <main>
            <div id="posts-container"></div>
            <div id="loading-node" class="status-msg">INITIALIZING...</div>
        </main>
    </div>

    <script>
        // --- 核心配置 ---
        const CONFIG = {
            USER: 'Isvxs',
            REPO: 'HevBlog',
            BRANCH: 'main',
            PAGE_SIZE: 9
        };

        let db = { all: [], filtered: [], ptr: 0, isBusy: false };
        const container = document.getElementById('posts-container');
        const loadingNode = document.getElementById('loading-node');
        const searchInput = document.getElementById('search');

        // --- 1. 深色模式 ---
        const toggle = document.getElementById('theme-toggle');
        const saveTheme = (t) => { document.body.setAttribute('data-theme', t); localStorage.setItem('theme', t); };
        saveTheme(localStorage.getItem('theme') || 'light');
        toggle.onclick = () => saveTheme(document.body.getAttribute('data-theme') === 'light' ? 'dark' : 'light');

        // --- 2. 初始化 ---
        async function init() {
            try {
                const sUrl = `https://raw.githubusercontent.com/${CONFIG.USER}/${CONFIG.REPO}/${CONFIG.BRANCH}/status.json?t=${Date.now()}`;
                const s = await fetch(sUrl).then(r => r.json());
                if (s && s.isFixing === true) { window.location.replace('Fixing.html'); return; }
            } catch(e) { console.warn("Status check failed."); }

            loadingNode.innerText = "CONNECTING TO DATABASE...";

            try {
                const refUrl = `https://api.github.com/repos/${CONFIG.USER}/${CONFIG.REPO}/git/ref/heads/${CONFIG.BRANCH}`;
                const refRes = await fetch(refUrl);
                if (refRes.status === 403) throw new Error("API_LIMIT");
                const refData = await refRes.json();
                
                const treeUrl = `https://api.github.com/repos/${CONFIG.USER}/${CONFIG.REPO}/git/trees/${refData.object.sha}?recursive=1`;
                const treeRes = await fetch(treeUrl);
                const treeData = await treeRes.json();

                db.all = treeData.tree
                    .filter(item => item.path.startsWith('posts/') && item.path.endsWith('.json'))
                    .map(item => ({
                        sha: item.sha,
                        name: item.path.split('/').pop(),
                        download_url: `https://cdn.jsdelivr.net/gh/${CONFIG.USER}/${CONFIG.REPO}@${CONFIG.BRANCH}/${item.path}`
                    }))
                    .reverse();

                localStorage.setItem('hevlog_backup_tree', JSON.stringify(db.all));
                db.filtered = [...db.all];
                renderNextBatch();

            } catch (err) {
                console.error("Init Error:", err);
                const backup = localStorage.getItem('hevlog_backup_tree');
                if (backup) {
                    db.all = JSON.parse(backup);
                    db.filtered = [...db.all];
                    renderNextBatch();
                    loadingNode.innerText = "OFFLINE MODE: LOADED FROM CACHE.";
                } else {
                    loadingNode.innerText = err.message === "API_LIMIT" ? "API LIMIT EXCEEDED. TRY LATER." : "CONNECTION ERROR.";
                }
            }

            window.onscroll = () => {
                if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 800) renderNextBatch();
            };
        }

        // --- 3. 渲染邏輯 ---
        async function renderNextBatch() {
            if (db.isBusy || db.ptr >= db.filtered.length) return;
            db.isBusy = true;
            loadingNode.innerText = "LOADING BATCH...";

            const batch = db.filtered.slice(db.ptr, db.ptr + CONFIG.PAGE_SIZE);
            
            for (const file of batch) {
                try {
                    const cacheKey = `p_${file.sha}`;
                    let post = JSON.parse(localStorage.getItem(cacheKey));
                    
                    if (!post) {
                        post = await fetch(file.download_url).then(r => r.json());
                        localStorage.setItem(cacheKey, JSON.stringify(post));
                    }
                    createPostElement(post, file.sha);
                } catch (e) { console.error("Skip post"); }
            }

            db.ptr += batch.length;
            db.isBusy = false;
            loadingNode.innerText = db.ptr >= db.filtered.length ? "END OF LOGS." : "SCROLL FOR MORE.";
            updateTOC();
        }

        // --- 新增：取得/初始化文章的反應數據 ---
        function getReactions(sha) {
            const data = localStorage.getItem(`react_${sha}`);
            // 預設基礎數量可以加上亂數讓畫面不那麼空，或者預設為 0
            return data ? JSON.parse(data) : { up: 0, down: 0, userChoice: null };
        }

        // --- 新增：處理點擊反應的邏輯 ---
        window.toggleReaction = function(sha, type) {
            const data = getReactions(sha);
            const otherType = type === 'up' ? 'down' : 'up';

            if (data.userChoice === type) {
                // 取消選擇
                data[type]--;
                data.userChoice = null;
            } else {
                // 新增選擇，若原本選另一個則切換
                if (data.userChoice === otherType) {
                    data[otherType]--;
                }
                data[type]++;
                data.userChoice = type;
            }

            localStorage.setItem(`react_${sha}`, JSON.stringify(data));
            
            // 更新 UI
            const btnUp = document.getElementById(`btn-up-${sha}`);
            const btnDown = document.getElementById(`btn-down-${sha}`);
            
            btnUp.className = `reaction-btn ${data.userChoice === 'up' ? 'active' : ''}`;
            btnDown.className = `reaction-btn ${data.userChoice === 'down' ? 'active' : ''}`;
            
            btnUp.querySelector('.count').innerText = data.up;
            btnDown.querySelector('.count').innerText = data.down;
        };

        function createPostElement(post, sha) {
            const art = document.createElement('article');
            const reactData = getReactions(sha); // 取得這篇文的反應狀態
            art.className = 'post-card';
            art.id = `post-${sha}`;
            art.innerHTML = `
                <div class="meta">
                    <span class="category">${post.category || 'GENERAL'}</span>
                    <span>${new Date(post.date).toLocaleDateString()}</span>
                </div>
                <h2>${post.title}</h2>
                <div class="content">${post.content}</div>
                <div class="reactions">
                    <button id="btn-up-${sha}" class="reaction-btn ${reactData.userChoice === 'up' ? 'active' : ''}" onclick="toggleReaction('${sha}', 'up')">
                        <span class="emoji-icon">👍</span> <span class="count">${reactData.up}</span>
                    </button>
                    <button id="btn-down-${sha}" class="reaction-btn ${reactData.userChoice === 'down' ? 'active' : ''}" onclick="toggleReaction('${sha}', 'down')">
                        <span class="emoji-icon">👎</span> <span class="count">${reactData.down}</span>
                    </button>
                </div>
            `;
            container.appendChild(art);
        }

        // --- 4. 深度搜尋 ---
        let searchTimer;
        searchInput.oninput = (e) => {
            clearTimeout(searchTimer);
            const term = e.target.value.toLowerCase().trim();
            searchTimer = setTimeout(() => {
                container.innerHTML = '';
                db.ptr = 0;
                db.filtered = db.all.filter(file => {
                    const cached = localStorage.getItem(`p_${file.sha}`);
                    if (cached) {
                        const post = JSON.parse(cached);
                        return (post.title?.toLowerCase().includes(term) || post.content?.toLowerCase().includes(term));
                    }
                    return file.name.toLowerCase().includes(term);
                });
                renderNextBatch();
            }, 400);
        };

        // --- 5. 目錄導覽 ---
        function updateTOC() {
            const toc = document.getElementById('toc-list');
            const posts = container.querySelectorAll('.post-card');
            toc.innerHTML = '';
            posts.forEach((post) => {
                const title = post.querySelector('h2').innerText;
                const a = document.createElement('a');
                a.className = 'toc-item';
                a.href = "javascript:void(0);";
                a.innerText = title;
                a.onclick = () => {
                    const rect = post.getBoundingClientRect();
                    const offset = window.pageYOffset + rect.top - 80;
                    window.scrollTo({ top: offset, behavior: 'smooth' });
                };
                toc.appendChild(a);
            });
        }

        init();
    </script>
</body>
</html>
