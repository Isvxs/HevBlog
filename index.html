<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HevLog | Enterprise Scale</title>
    <style>
        :root {
            --primary-bg: #fdfdfd; --secondary-bg: #f6f8fa; --card-bg: #ffffff;
            --text-main: #1c1e21; --text-muted: #57606a; --accent: #007aff;
            --border: #eaecef; --header-height: 70px; --card-shadow: 0 4px 20px rgba(0,0,0,0.05);
        }

        [data-theme="dark"] {
            --primary-bg: #0d1117; --secondary-bg: #010409; --card-bg: #161b22;
            --text-main: #c9d1d9; --text-muted: #8b949e; --accent: #58a6ff;
            --border: #30363d; --card-shadow: 0 4px 20px rgba(0,0,0,0.3);
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            background-color: var(--primary-bg); color: var(--text-main);
            margin: 0; padding-top: var(--header-height); transition: background 0.2s ease;
            text-rendering: optimizeLegibility;
        }

        /* 系統輕量化：使用 Layout Containment 優化渲染 */
        .post-card {
            contain: content; will-change: transform;
            background: var(--card-bg); padding: 25px; border-radius: 12px;
            box-shadow: var(--card-shadow); margin-bottom: 25px;
            border: 1px solid var(--border); transition: transform 0.2s cubic-bezier(0.2, 0, 0.2, 1);
        }
        .post-card:hover { transform: translateY(-4px); border-color: var(--accent); }

        header {
            position: fixed; top: 0; width: 100%; height: var(--header-height);
            background: var(--card-bg); border-bottom: 1px solid var(--border);
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 30px; box-sizing: border-box; z-index: 1000; backdrop-filter: blur(8px);
        }

        .controls { display: flex; gap: 15px; align-items: center; }
        .search-bar {
            background: var(--secondary-bg); border: 1px solid var(--border);
            color: var(--text-main); padding: 8px 16px; border-radius: 20px; outline: none;
            width: 200px; transition: width 0.3s;
        }
        .search-bar:focus { width: 300px; border-color: var(--accent); }

        /* 目錄導覽索引 */
        #toc-container {
            position: fixed; left: 20px; top: 100px; width: 180px;
            font-size: 0.85rem; max-height: 80vh; overflow-y: auto;
        }
        .toc-link {
            color: var(--text-muted); text-decoration: none; display: block;
            padding: 4px 8px; border-left: 2px solid transparent;
        }
        .toc-link.active { color: var(--accent); border-left-color: var(--accent); font-weight: 600; }

        #theme-toggle {
            cursor: pointer; background: var(--secondary-bg); border: 1px solid var(--border);
            color: var(--text-main); padding: 5px 12px; border-radius: 6px; font-size: 12px;
        }

        main { max-width: 750px; margin: 30px auto; padding: 0 20px; position: relative; }
        
        /* 骨架屏與讀取動畫 */
        .skeleton { height: 200px; background: var(--secondary-bg); border-radius: 12px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 50% { opacity: .5; } }
        
        @media (max-width: 1000px) { #toc-container { display: none; } }
    </style>
</head>
<body data-theme="light">

<header>
    <h1 style="font-size: 1.4rem; font-weight: 800; color: var(--accent);">HevLog</h1>
    <div class="controls">
        <input type="search" id="search" class="search-bar" placeholder="檢索紀錄...">
        <button id="theme-toggle">🌓 模式</button>
    </div>
</header>

<nav id="toc-container">
    <div style="font-weight: bold; margin-bottom: 10px; font-size: 0.75rem; text-transform: uppercase; color: var(--text-muted);">Content Index</div>
    <div id="toc-list"></div>
</nav>

<main>
    <div id="posts-container"></div>
    <div id="loading-node" class="skeleton"></div>
</main>

<script>
    const GITHUB_CONFIG = { user: 'Isvxs', repo: 'HevBlog', path: 'posts' };
    let allFiles = [], filteredFiles = [], currentIndex = 0;
    let isFetching = false;
    const PAGE_SIZE = 9;

    // --- 1. 效能優化：主題切換與持久化 ---
    const initTheme = () => {
        const saved = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        document.body.setAttribute('data-theme', saved);
    };
    document.getElementById('theme-toggle').onclick = () => {
        const next = document.body.getAttribute('data-theme') === 'light' ? 'dark' : 'light';
        document.body.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
    };

    // --- 2. 核心：大數據處理 ---
    async function init() {
        initTheme();
        
        // 維護檢測
        try {
            const status = await fetch(`status.json?t=${Date.now()}`).then(r => r.json());
            if (status.isFixing) return window.location.href = 'Fixing.html';
        } catch(e) {}

        // 輕量化獲取：只拿目錄，不拿內容
        try {
            const res = await fetch(`https://api.github.com/repos/${GITHUB_CONFIG.user}/${GITHUB_CONFIG.repo}/contents/${GITHUB_CONFIG.path}?t=${Date.now()}`);
            allFiles = (await res.json()).filter(f => f.name.endsWith('.json')).reverse();
            filteredFiles = [...allFiles]; // 初始搜尋列表
            renderNextBatch();
        } catch (e) {
            document.getElementById('loading-node').innerText = "GitHub API 限制或連線錯誤";
        }

        // 滾動監聽
        window.addEventListener('scroll', () => {
            if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 500) {
                renderNextBatch();
            }
        });
    }

    async function renderNextBatch() {
        if (isFetching || currentIndex >= filteredFiles.length) return;
        isFetching = true;
        
        const batch = filteredFiles.slice(currentIndex, currentIndex + PAGE_SIZE);
        const container = document.getElementById('posts-container');

        // 批次並行抓取內容
        const postHTMLs = await Promise.all(batch.map(async file => {
            const cacheKey = `p_${file.sha}`;
            let data = JSON.parse(localStorage.getItem(cacheKey));
            
            if (!data) {
                data = await fetch(file.download_url).then(r => r.json());
                localStorage.setItem(cacheKey, JSON.stringify(data));
            }
            
            return `
                <article class="post-card" id="card-${file.sha}">
                    <div style="color:var(--accent); font-size:0.75rem; font-weight:700;">${data.category || 'LOG'}</div>
                    <h2 style="margin:8px 0; font-size:1.5rem;">${data.title}</h2>
                    <div style="font-size:0.8rem; color:var(--text-muted); margin-bottom:15px;">📅 ${new Date(data.date).toLocaleDateString()}</div>
                    <div class="content" style="line-height:1.7;">${data.content}</div>
                </article>
            `;
        }));

        container.insertAdjacentHTML('beforeend', postHTMLs.join(''));
        currentIndex += PAGE_SIZE;
        isFetching = false;
        updateTOC();
    }

    // --- 3. 搜尋優化：防抖與虛擬過濾 ---
    let searchTimeout;
    document.getElementById('search').oninput = (e) => {
        clearTimeout(searchTimeout);
        searchTimeout = setTimeout(() => {
            const term = e.target.value.toLowerCase();
            currentIndex = 0;
            document.getElementById('posts-container').innerHTML = '';
            
            // 輕量化搜尋：只過濾檔名索引，不觸發大量 DOM 操作
            filteredFiles = allFiles.filter(f => f.name.toLowerCase().includes(term));
            renderNextBatch();
        }, 250); // 防抖 250ms
    };

    // --- 4. 目錄索引自動生成 ---
    function updateTOC() {
        const list = document.getElementById('toc-list');
        const cards = document.querySelectorAll('.post-card h2');
        list.innerHTML = [...cards].map(h2 => `
            <a href="javascript:void(0)" class="toc-link" onclick="document.getElementById('${h2.parentElement.id}').scrollIntoView({behavior:'smooth', block:'center'})">
                • ${h2.innerText.substring(0, 15)}...
            </a>
        `).join('');
    }

    init();
</script>
</body>
</html>
