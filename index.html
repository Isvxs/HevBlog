<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HevLog | Dev Log</title>
    <style>
        :root {
            /* 公式化色彩與字體 */
            --bg: #ffffff; --card: #ffffff; --text: #1a1a1a; --muted: #666666;
            --accent: #000000; --border: #e1e1e1; --header-bg: rgba(255,255,255,0.8);
            --font-main: "SF Mono", "Cascadia Code", "Fira Code", "Courier New", monospace;
        }

        [data-theme="dark"] {
            --bg: #0a0a0a; --card: #141414; --text: #e0e0e0; --muted: #888888;
            --accent: #ffffff; --border: #262626; --header-bg: rgba(10,10,10,0.8);
        }

        * { box-sizing: border-box; }
        body {
            margin: 0; background-color: var(--bg); color: var(--text);
            font-family: var(--font-main); line-height: 1.5;
            transition: background 0.2s ease;
        }

        /* 頂部導航 - 輕量化毛玻璃 */
        header {
            position: fixed; top: 0; width: 100%; height: 60px;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 30px; border-bottom: 1px solid var(--border);
            background: var(--header-bg); backdrop-filter: blur(10px); z-index: 1000;
        }

        header h1 { font-size: 1.2rem; font-weight: 800; letter-spacing: -1px; margin: 0; cursor: pointer; }

        .nav-right { display: flex; align-items: center; gap: 15px; }

        /* 搜尋框優化 - 公式化樣式 */
        .search-bar {
            background: var(--bg); border: 1px solid var(--border);
            color: var(--text); padding: 6px 12px; font-family: var(--font-main);
            font-size: 0.85rem; width: 220px; outline: none; transition: width 0.3s;
        }
        .search-bar:focus { border-color: var(--accent); width: 280px; }

        #theme-toggle {
            background: none; border: 1px solid var(--border); color: var(--text);
            padding: 4px 10px; cursor: pointer; font-family: var(--font-main); font-size: 0.75rem;
        }

        /* 佈局 */
        .layout { display: flex; max-width: 1200px; margin: 80px auto 0; padding: 0 20px; gap: 40px; }

        /* 左側目錄 - 固定位置 */
        aside { width: 220px; position: sticky; top: 80px; height: fit-content; }
        aside h4 { font-size: 0.75rem; text-transform: uppercase; color: var(--muted); margin-bottom: 15px; }
        .toc-item { 
            display: block; font-size: 0.8rem; color: var(--muted); text-decoration: none;
            padding: 4px 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
            transition: color 0.2s; border-left: 2px solid transparent; padding-left: 10px;
        }
        .toc-item:hover { color: var(--accent); border-left-color: var(--accent); }

        /* 文章區域 */
        main { flex: 1; max-width: 700px; }
        .post-card {
            padding-bottom: 50px; margin-bottom: 50px; border-bottom: 1px solid var(--border);
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .meta { font-size: 0.75rem; color: var(--muted); margin-bottom: 8px; display: flex; gap: 15px; }
        .category { color: var(--accent); font-weight: bold; }
        .post-card h2 { font-size: 1.5rem; margin: 0 0 15px 0; letter-spacing: -0.5px; }
        .content { font-size: 0.95rem; color: var(--text); }
        .content img { max-width: 100%; border-radius: 2px; filter: grayscale(0.2); transition: 0.3s; }
        .content img:hover { filter: grayscale(0); }

        /* 狀態提示 */
        .status-msg { text-align: center; padding: 40px; font-size: 0.8rem; color: var(--muted); }

        @media (max-width: 900px) { aside { display: none; } .layout { justify-content: center; } }
    </style>
</head>
<body data-theme="light">

    <header>
        <h1 onclick="location.reload()">HevLog</h1>
        <div class="nav-right">
            <input type="search" id="search" class="search-bar" placeholder="搜尋文章內容...">
            <button id="theme-toggle">MODE</button>
        </div>
    </header>

    <div class="layout">
        <aside>
            <h4>Index / 目錄導覽</h4>
            <div id="toc-list"></div>
        </aside>

        <main>
            <div id="posts-container"></div>
            <div id="loading-node" class="status-msg">INITIALIZING...</div>
        </main>
    </div>

    <script>
        const GITHUB_USER = 'Isvxs';
        const GITHUB_REPO = 'HevBlog';
        
        let allFiles = [];      // 原始清單 (30k 條)
        let filteredFiles = []; // 搜尋過濾後的清單
        let displayedCount = 0; 
        let isFetching = false;
        const PAGE_SIZE = 9;
        
        const container = document.getElementById('posts-container');
        const loadingNode = document.getElementById('loading-node');
        const searchInput = document.getElementById('search');

        // --- 1. 深色模式 (手動與系統記住) ---
        const toggle = document.getElementById('theme-toggle');
        const saveTheme = (t) => { document.body.setAttribute('data-theme', t); localStorage.setItem('theme', t); };
        saveTheme(localStorage.getItem('theme') || 'light');
        toggle.onclick = () => saveTheme(document.body.getAttribute('data-theme') === 'light' ? 'dark' : 'light');

        // --- 2. 核心：輕量化初始化 ---
        async function init() {
            // 維護模式檢測
            try {
                const s = await fetch('status.json?t=' + Date.now()).then(r => r.json());
                if (s.isFixing) { window.location.href = 'Fixing.html'; return; }
            } catch(e) {}

            loadingNode.innerText = "FETCHING REPO DATA...";
            
            try {
                // 僅抓取清單，這對 30k 個檔案來說 GitHub API 仍能負擔 (但建議未來改用 Git Trees API)
                const res = await fetch(`https://api.github.com/repos/${GITHUB_USER}/${GITHUB_REPO}/contents/posts?t=${Date.now()}`);
                const data = await res.json();
                
                // 過濾出 JSON 並逆序排列
                allFiles = data.filter(f => f.name.endsWith('.json')).reverse();
                filteredFiles = [...allFiles]; // 初始顯示全部
                
                renderNextBatch();
            } catch (e) {
                loadingNode.innerText = "CONNECTION ERROR.";
            }

            // 無限滾動
            window.onscroll = () => {
                if ((window.innerHeight + window.scrollY) >= document.body.offsetHeight - 500) {
                    renderNextBatch();
                }
            };
        }

        // --- 3. 高效渲染與搜尋 ---
        async function renderNextBatch() {
            if (isFetching || displayedCount >= filteredFiles.length) return;
            isFetching = true;
            loadingNode.innerText = "LOADING BATCH...";

            const batch = filteredFiles.slice(displayedCount, displayedCount + PAGE_SIZE);
            
            for (const file of batch) {
                try {
                    // 使用 SHA 快取文章內容，避免 30k 規模下的重複流量
                    const cacheKey = `p_${file.sha}`;
                    let post = JSON.parse(localStorage.getItem(cacheKey));
                    
                    if (!post) {
                        post = await fetch(file.download_url).then(r => r.json());
                        localStorage.setItem(cacheKey, JSON.stringify(post));
                    }
                    
                    createPostElement(post);
                } catch (e) { console.error("Skip post error"); }
            }

            displayedCount += batch.length;
            isFetching = false;
            loadingNode.innerText = displayedCount >= filteredFiles.length ? "END OF LOGS." : "SCROLL FOR MORE.";
            updateTOC();
        }

        function createPostElement(post) {
            const art = document.createElement('article');
            art.className = 'post-card';
            art.innerHTML = `
                <div class="meta">
                    <span class="category">${post.category || 'GENERAL'}</span>
                    <span>${new Date(post.date).toLocaleDateString()}</span>
                </div>
                <h2>${post.title}</h2>
                <div class="content">${post.content}</div>
            `;
            container.appendChild(art);
        }

        // --- 4. 搜尋優化 (不卡頓邏輯) ---
        let searchTimer;
        searchInput.oninput = (e) => {
            clearTimeout(searchTimer);
            const term = e.target.value.toLowerCase().trim();
            
            // 使用 Debounce 延遲搜尋，避免每輸入一個字就處理 30k 數據
            searchTimer = setTimeout(() => {
                container.innerHTML = '';
                displayedCount = 0;
                
                if (term === "") {
                    filteredFiles = [...allFiles];
                } else {
                    // 輕量化搜尋：只過濾檔案名稱 (通常檔名含日期/關鍵字)
                    // 若要過濾內容，30k 規模需在 Server 端或預索引，此處以檔名搜尋優化效能
                    filteredFiles = allFiles.filter(f => f.name.toLowerCase().includes(term));
                }
                
                renderNextBatch();
                if(filteredFiles.length === 0) loadingNode.innerText = "NO POSTS FOUND.";
            }, 300);
        };

        // --- 5. 目錄導覽 ---
        function updateTOC() {
            const toc = document.getElementById('toc-list');
            const h2s = container.querySelectorAll('h2');
            toc.innerHTML = '';
            h2s.forEach((h, i) => {
                h.id = `h-${i}`;
                const a = document.createElement('a');
                a.className = 'toc-item';
                a.href = `#h-${i}`;
                a.innerText = h.innerText;
                a.onclick = (e) => { e.preventDefault(); h.scrollIntoView({ behavior: 'smooth' }); };
                toc.appendChild(a);
            });
        }

        init();
    </script>
</body>
</html>
