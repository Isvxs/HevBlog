<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系統狀態 | HevLog</title>
    <style>
        :root {
            --bg-dark: #000000;
            --text-main: #ffffff;
            --text-muted: #888888;
            --border-white: #ffffff;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif, monospace;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            position: relative;
        }

        /* --- 滾動橫幅 --- */
        .banner {
            position: absolute;
            left: 0;
            width: 100vw;
            height: 40px;
            background-color: var(--bg-dark);
            border-top: 1px solid var(--border-white);
            border-bottom: 1px solid var(--border-white);
            color: var(--text-main);
            display: flex;
            align-items: center;
            font-size: 1.1rem;
            font-weight: 800;
            letter-spacing: 4px;
            text-transform: uppercase;
            z-index: 10;
            /* 強制橫幅內所有內容（含 Emoji）變為純黑白 */
            filter: grayscale(100%) contrast(2000%);
        }

        .banner-top { top: 0; }
        .banner-bottom { bottom: 0; }

        .banner-track {
            display: flex;
            width: max-content;
            animation: scroll-left 20s linear infinite;
        }

        .banner-bottom .banner-track {
            animation-direction: reverse; 
        }

        .banner-track span {
            padding: 0 30px;
            white-space: nowrap;
        }

        @keyframes scroll-left {
            0% { transform: translateX(0); }
            100% { transform: translateX(-50%); } 
        }

        /* --- 中央卡片 --- */
        .status-card {
            background-color: var(--bg-dark);
            width: 90%;
            max-width: 500px;
            padding: 40px;
            border-radius: 12px;
            border: 1px solid var(--border-white);
            box-shadow: 0 10px 40px rgba(255,255,255,0.05);
            text-align: center;
            z-index: 5;
        }

        .icon { 
            font-size: 3.5rem; 
            margin-bottom: 20px; 
            /* 強制中央 Emoji 變為純黑白 */
            filter: grayscale(100%) contrast(2000%);
        }
        
        h1 { 
            font-size: 1.6rem; 
            margin-bottom: 15px; 
            letter-spacing: 1px;
            font-weight: 700;
        }

        .message-box {
            line-height: 1.8;
            padding: 20px;
            border-radius: 8px;
            text-align: left;
            margin-top: 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.1);
            min-height: 60px;
        }

        .footer { 
            margin-top: 20px; 
            font-size: 0.75rem; 
            color: var(--text-muted);
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .btn-home {
            display: inline-block;
            margin-top: 25px;
            padding: 12px 24px;
            background: var(--text-main);
            color: var(--bg-dark);
            text-decoration: none;
            border-radius: 8px;
            font-weight: bold;
            display: none;
            transition: all 0.2s ease;
            border: 1px solid var(--text-main);
        }

        .btn-home:hover {
            background: var(--bg-dark);
            color: var(--text-main);
        }
    </style>
</head>
<body>

    <div class="banner banner-top">
        <div class="banner-track" id="track-top"></div>
    </div>

    <div id="main-card" class="status-card">
        <div id="status-icon" class="icon">⌛</div>
        <h1 id="status-title">正在檢測伺服器...</h1>
        
        <div id="message-box" class="message-box">
            請稍候，正在獲取最新系統狀態。
        </div>

        <a href="index.html" id="home-btn" class="btn-home">回到首頁</a>
        <div class="footer">HevLog Status System</div>
    </div>

    <div class="banner banner-bottom">
        <div class="banner-track" id="track-bottom"></div>
    </div>

    <script>
        function setBannerText(text) {
            const repeatCount = 10;
            let fullHTML = '';
            for (let i = 0; i < repeatCount; i++) {
                fullHTML += `<span>${text}</span>`;
            }
            document.getElementById('track-top').innerHTML = fullHTML;
            document.getElementById('track-bottom').innerHTML = fullHTML;
        }

        async function checkStatus() {
            const card = document.getElementById('main-card');
            const icon = document.getElementById('status-icon');
            const title = document.getElementById('status-title');
            const msgBox = document.getElementById('message-box');
            const homeBtn = document.getElementById('home-btn');

            setBannerText("⚠ DETECTING SYSTEM STATUS /// PLEASE WAIT ⚠");

            try {
                const res = await fetch('status.json?t=' + Date.now());
                if (!res.ok) throw new Error();
                const data = await res.json();

                if (data.isFixing) {
                    icon.innerText = "🛠";
                    title.innerText = "系統維護中";
                    msgBox.innerText = data.message || "正在進行系統優化，請稍後再試。";
                    setBannerText("⚠ SYSTEM MAINTENANCE IN PROGRESS /// PLEASE STAND BY ⚠");
                } else {
                    icon.innerText = "◻"; 
                    title.innerText = "伺服器運作正常";
                    msgBox.innerHTML = "目前系統運作一切正常，歡迎訪問。<br><small style='color:#888'>將在 3 秒後自動導回首頁...</small>";
                    homeBtn.style.display = "inline-block";
                    setBannerText("ALL SYSTEMS NOMINAL /// SERVER ONLINE");

                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 3000);
                }
            } catch (e) {
                icon.innerText = "🌐";
                title.innerText = "伺服器運作正常";
                msgBox.innerText = "連線成功，未偵測到維護指令。";
                homeBtn.style.display = "inline-block";
                setBannerText("ALL SYSTEMS NOMINAL /// SERVER ONLINE");
            }
        }

        checkStatus();
    </script>
</body>
</html>
