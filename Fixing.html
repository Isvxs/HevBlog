<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系統狀態 | HevLog</title>
    <style>
        :root {
            --bg-dark: #0d1117;
            --card-dark: #161b22;
            --accent-blue: #63adf7;
            --accent-green: #2ea44f;
            --text-main: #c9d1d9;
            --text-muted: #8b949e;
        }

        body {
            background-color: var(--bg-dark);
            color: var(--text-main);
            font-family: system-ui, -apple-system, sans-serif;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .status-card {
            background-color: var(--card-dark);
            width: 90%;
            max-width: 500px;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            text-align: center;
            transition: border 0.3s ease;
        }

        /* 維護中的邊框顏色 */
        .status-fixing { border-top: 5px solid var(--accent-blue); }
        /* 正常的邊框顏色 */
        .status-normal { border-top: 5px solid var(--accent-green); }

        .icon { font-size: 3.5rem; margin-bottom: 20px; }
        
        h1 { font-size: 1.6rem; margin-bottom: 15px; letter-spacing: 1px; }

        .message-box {
            line-height: 1.8;
            padding: 20px;
            border-radius: 8px;
            text-align: left;
            margin-top: 20px;
            background: rgba(255,255,255,0.03);
            min-height: 60px;
        }

        .footer { margin-top: 30px; font-size: 0.8rem; color: var(--text-muted); }

        /* 按鈕優化 */
        .btn-home {
            display: inline-block;
            margin-top: 20px;
            padding: 10px 20px;
            background: var(--accent-green);
            color: white;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            display: none; /* 預設隱藏，正常時才顯示 */
        }
    </style>
</head>
<body>

    <div id="main-card" class="status-card">
        <div id="status-icon" class="icon">⌛</div>
        <h1 id="status-title">正在檢測伺服器...</h1>
        
        <div id="message-box" class="message-box">
            請稍候，正在獲取最新系統狀態。
        </div>

        <a href="index.html" id="home-btn" class="btn-home">回到首頁</a>

        <div class="footer">HevLog Status System</div>
    </div>

    <script>
        async function checkStatus() {
            const card = document.getElementById('main-card');
            const icon = document.getElementById('status-icon');
            const title = document.getElementById('status-title');
            const msgBox = document.getElementById('message-box');
            const homeBtn = document.getElementById('home-btn');

            try {
                // 強制抓取最新 status.json
                const res = await fetch('status.json?t=' + Date.now());
                if (!res.ok) throw new Error();
                
                const data = await res.json();

                if (data.isFixing) {
                    // --- 顯示維護中狀態 ---
                    card.classList.add('status-fixing');
                    icon.innerText = "🛠️";
                    title.innerText = "系統維護中";
                    title.style.color = "var(--accent-blue)";
                    msgBox.innerText = data.message || "正在進行系統優化，請稍後再試。";
                } else {
                    // --- 顯示正常狀態 ---
                    card.classList.add('status-normal');
                    icon.innerText = "✅";
                    title.innerText = "HevLog 伺服器維護正常！";
                    title.style.color = "var(--accent-green)";
                    msgBox.innerHTML = "目前系統運作一切正常，歡迎訪問。<br><small style='color:gray'>將在 3 秒後自動導回首頁...</small>";
                    homeBtn.style.display = "inline-block";

                    // 3 秒後自動跳轉
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 3000);
                }
            } catch (e) {
                // 如果找不到 status.json，預設顯示正常
                card.classList.add('status-normal');
                icon.innerText = "🌐";
                title.innerText = "HevLog 伺服器維護正常！";
                msgBox.innerText = "連線成功，未偵測到維護指令。";
                homeBtn.style.display = "inline-block";
            }
        }

        checkStatus();
    </script>
</body>
</html>
